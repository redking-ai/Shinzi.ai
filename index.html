<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shinzi AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo-circle" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L14.5 9L21 11.5L14.5 14L12 21L9.5 14L3 11.5L9.5 9L12 3Z" fill="currentColor"></path>
        </svg>
      </div>
      <span class="logo-text">Shinzi <span class="logo-ai">AI</span></span>
    </div>

    <div class="nav-right">
      <button id="loginTrigger" class="btn-login">Sign In</button>

      <div id="userProfile" class="user-profile hidden">
        <img id="userPhoto" class="user-photo hidden" alt="User avatar">
        <div id="userAvatar" class="user-avatar">SB</div>
        <button id="logoutBtn" class="btn-logout">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="app-container">
    <section id="welcomeScreen" class="welcome-screen">
      <p class="overline">SHINZI AI • POWERED BY AI</p>
      <h1 class="main-title">What can I help you with?</h1>
      <p class="subtitle">Pick a starting point — or just ask anything below.</p>
    </section>

    <section id="chatWindow" class="chat-window" aria-live="polite"></section>

    <div class="bottom-controls">
      <div id="suggestions" class="suggestions-grid">
        <button class="card suggestion-btn" type="button" data-prompt="Make me a website">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"></circle>
              <path d="M3.5 12h17" stroke="currentColor" stroke-width="1.7"></path>
              <path d="M12 3c2.5 2.8 3.8 5.9 3.8 9s-1.3 6.2-3.8 9" stroke="currentColor" stroke-width="1.7"></path>
              <path d="M12 3c-2.5 2.8-3.8 5.9-3.8 9s1.3 6.2 3.8 9" stroke="currentColor" stroke-width="1.7"></path>
            </svg>
          </span>
          <span class="card-content">
            <strong>Make me a website</strong>
            <p>Tap to start</p>
          </span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Build me an app">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="7" y="3" width="10" height="18" rx="2" stroke="currentColor" stroke-width="1.7"></rect>
              <path d="M10 18h4" stroke="currentColor" stroke-width="1.7"></path>
            </svg>
          </span>
          <span class="card-content">
            <strong>Build me an app</strong>
            <p>Tap to start</p>
          </span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Help me study">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 6.5c3-2 5.8-2 8 0v13c-2.2-2-5-2-8 0v-13Z" stroke="currentColor" stroke-width="1.7"></path>
              <path d="M20 6.5c-3-2-5.8-2-8 0v13c2.2-2 5-2 8 0v-13Z" stroke="currentColor" stroke-width="1.7"></path>
            </svg>
          </span>
          <span class="card-content">
            <strong>Help me study</strong>
            <p>Tap to start</p>
          </span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Deep research">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.7"></circle>
              <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.7"></path>
            </svg>
          </span>
          <span class="card-content">
            <strong>Deep research</strong>
            <p>Tap to start</p>
          </span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Generate code">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 8l-4 4 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M15 8l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </span>
          <span class="card-content">
            <strong>Generate code</strong>
            <p>Tap to start</p>
          </span>
        </button>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <input type="text" id="chatInput" placeholder="Ask anything..." autocomplete="off">
          <button id="sendBtn" class="send-btn" type="button" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Shinzi AI can make mistakes. Check important info.</p>
      </div>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinzi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-circle">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3L14.5 9L21 11.5L14.5 14L12 21L9.5 14L3 11.5L9.5 9L12 3Z" fill="black" />
                </svg>
            </div>
            <span class="logo-text">Shinzi <span class="logo-ai">AI</span></span>
        </div>
        <div class="nav-right">
            <div id="userProfile" class="user-profile">
                <div class="user-avatar">SB</div>
                <button id="logoutBtn" class="btn-logout">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="app-container">
        <div id="welcomeScreen" class="welcome-screen">
            <p class="overline">SHINZI AI • POWERED BY GEMINI 3</p>
            <h1 class="main-title">What can I help you with?</h1>
            <p class="subtitle">Pick a starting point — or just ask anything below.</p>
        </div>

        <div id="chatWindow" class="chat-window"></div>

        <div class="bottom-controls">
            <div id="suggestions" class="suggestions-grid">
                <button class="card" onclick="handleSuggestion('Make me a website')">
                    <span class="card-icon">🌐</span>
                    <div class="card-content"><strong>Make me a website</strong><p>Tap to start</p></div>
                </button>
                <button class="card" onclick="handleSuggestion('Build me an app')">
                    <span class="card-icon">📱</span>
                    <div class="card-content"><strong>Build me an app</strong><p>Tap to start</p></div>
                </button>
                <button class="card" onclick="handleSuggestion('Help me study')">
                    <span class="card-icon">📖</span>
                    <div class="card-content"><strong>Help me study</strong><p>Tap to start</p></div>
                </button>
                <button class="card" onclick="handleSuggestion('Deep research')">
                    <span class="card-icon">🔍</span>
                    <div class="card-content"><strong>Deep research</strong><p>Tap to start</p></div>
                </button>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="Ask anything..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">Shinzi AI may produce inaccurate info.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

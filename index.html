<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shinzi AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo-circle" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L14.5 9L21 11.5L14.5 14L12 21L9.5 14L3 11.5L9.5 9L12 3Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">Shinzi <span class="logo-ai">AI</span></span>
    </div>

    <div class="nav-right">
      <!-- Model Dropdown -->
      <div class="model-dropdown-wrapper" id="modelDropdownWrapper">
        <button class="model-dropdown-btn" id="modelDropdownBtn">
          <span id="selectedModelName">Laguna M.1</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="model-dropdown-menu hidden" id="modelDropdownMenu">
          <div class="model-group-label">Free Models</div>
          <button class="model-option" data-model="poolside/laguna-m.1:free" data-name="Laguna M.1">Laguna M.1</button>
          <button class="model-option" data-model="poolside/laguna-xs.2:free" data-name="Laguna XS.2">Laguna XS.2</button>
          <button class="model-option" data-model="meta-llama/llama-3.3-70b-instruct:free" data-name="Llama 3.3 70B">Llama 3.3 70B</button>
          <button class="model-option" data-model="meta-llama/llama-3.2-3b-instruct:free" data-name="Llama 3.2 3B">Llama 3.2 3B</button>
          <button class="model-option" data-model="google/gemma-3-27b-it:free" data-name="Gemma 3 27B">Gemma 3 27B</button>
          <button class="model-option" data-model="google/gemma-4-26b-a4b-it:free" data-name="Gemma 4 26B">Gemma 4 26B</button>
          <button class="model-option" data-model="nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free" data-name="Nemotron Nano">Nemotron Nano</button>
          <button class="model-option" data-model="z-ai/glm-4.5-air:free" data-name="GLM 4.5 Air">GLM 4.5 Air</button>
          <button class="model-option" data-model="liquid/lfm-2.5-1.2b-thinking:free" data-name="LFM 2.5 Thinking">LFM 2.5 Thinking</button>
          <button class="model-option" data-model="mistralai/mistral-7b-instruct:free" data-name="Mistral 7B">Mistral 7B</button>
        </div>
      </div>

      <button id="loginTrigger" class="btn-login">Sign In</button>

      <div id="userProfile" class="user-profile" style="display: none;">
        <div class="user-avatar" id="userAvatar" style="display:none;">U</div>
        <img id="userPhoto" class="user-photo hidden" alt="User avatar">
        <button id="logoutBtn" class="btn-logout">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="app-container">
    <section id="welcomeScreen" class="welcome-screen">
      <p class="overline">SHINZI AI • POWERED BY AI</p>
      <h1 class="main-title">What can I help you with?</h1>
      <p class="subtitle">Pick a starting point — or just ask anything below.</p>
    </section>

    <section id="chatWindow" class="chat-window" aria-live="polite"></section>

    <div class="bottom-controls">
      <div id="suggestions" class="suggestions-grid">
        <button class="card suggestion-btn" type="button" data-prompt="Make me a website">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/>
              <path d="M3.5 12h17" stroke="currentColor" stroke-width="1.7"/>
              <path d="M12 3c2.5 2.8 3.8 5.9 3.8 9s-1.3 6.2-3.8 9" stroke="currentColor" stroke-width="1.7"/>
              <path d="M12 3c-2.5 2.8-3.8 5.9-3.8 9s1.3 6.2 3.8 9" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="card-content"><strong>Make me a website</strong><p>Tap to start</p></span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Build me an app">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="7" y="3" width="10" height="18" rx="2" stroke="currentColor" stroke-width="1.7"/>
              <path d="M10 18h4" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="card-content"><strong>Build me an app</strong><p>Tap to start</p></span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Help me study">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 6.5c3-2 5.8-2 8 0v13c-2.2-2-5-2-8 0v-13Z" stroke="currentColor" stroke-width="1.7"/>
              <path d="M20 6.5c-3-2-5.8-2-8 0v13c2.2-2 5-2 8 0v-13Z" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="card-content"><strong>Help me study</strong><p>Tap to start</p></span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Deep research">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.7"/>
              <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </span>
          <span class="card-content"><strong>Deep research</strong><p>Tap to start</p></span>
        </button>

        <button class="card suggestion-btn" type="button" data-prompt="Generate code">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 8l-4 4 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 8l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="card-content"><strong>Generate code</strong><p>Tap to start</p></span>
        </button>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <input type="text" id="chatInput" placeholder="Ask anything..." autocomplete="off">
          <button id="sendBtn" class="send-btn" type="button" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Shinzi AI can make mistakes. Check important info.</p>
      </div>
    </div>
  </main>

  <script src="https://js.puter.com/v2/"></script>
  <script type="module" src="auth.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
